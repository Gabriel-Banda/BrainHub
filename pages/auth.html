<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | BrainHub</title>
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="icon" type="image/x-icon" href="/public/assets/images/favicon.png" />
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }
    .auth-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .auth-logo a {
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--text-900);
      text-decoration: none;
      letter-spacing: -0.03em;
    }
    .auth-logo span { color: var(--primary); }
    .auth-tabs {
      display: flex;
      background: var(--bg-muted);
      border-radius: 10px;
      padding: 3px;
      margin-bottom: 1.75rem;
      gap: 3px;
    }
    .auth-tab {
      flex: 1;
      padding: 0.55rem;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--text-500);
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .auth-tab.active {
      background: var(--card);
      color: var(--primary);
      box-shadow: 0 1px 6px rgba(0,0,0,0.1);
    }
    .auth-panel { display: none; }
    .auth-panel.active { display: block; }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }
    .form-group label {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-700);
    }
    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-wrap i {
      position: absolute;
      left: 0.9rem;
      color: var(--text-300);
      font-size: 0.85rem;
      pointer-events: none;
    }
    .input-wrap input {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.5rem;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--text-900);
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }
    .input-wrap input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    .toggle-pw {
      position: absolute;
      right: 0.75rem;
      background: none;
      border: none;
      color: var(--text-300);
      cursor: pointer;
      padding: 0.2rem;
      font-size: 0.85rem;
    }
    .toggle-pw:hover { color: var(--text-700); }

    .auth-btn {
      width: 100%;
      padding: 0.85rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.25rem;
    }
    .auth-btn:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,0.3); }
    .auth-btn:disabled { opacity: 0.65; pointer-events: none; transform: none; }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.25rem 0;
      color: var(--text-300);
      font-size: 0.78rem;
      font-weight: 600;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .google-btn {
      width: 100%;
      padding: 0.8rem;
      background: var(--bg);
      color: var(--text-900);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      transition: all 0.2s;
    }
    .google-btn:hover { border-color: var(--primary); box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .google-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    .forgot-link {
      font-size: 0.8rem;
      color: var(--primary);
      text-decoration: none;
      float: right;
      margin-top: 0.25rem;
    }
    .forgot-link:hover { text-decoration: underline; }

    .auth-error {
      display: none;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.25);
      color: #dc2626;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.83rem;
      margin-bottom: 1rem;
      align-items: center;
      gap: 0.5rem;
    }
    .auth-error.show { display: flex; }

    .auth-success {
      display: none;
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.25);
      color: #16a34a;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.83rem;
      margin-bottom: 1rem;
      align-items: center;
      gap: 0.5rem;
    }
    .auth-success.show { display: flex; }

    .terms-note {
      font-size: 0.74rem;
      color: var(--text-300);
      text-align: center;
      margin-top: 1rem;
      line-height: 1.6;
    }
    .terms-note a { color: var(--primary); text-decoration: none; }

    .strength-bar {
      height: 4px;
      border-radius: 99px;
      background: var(--border);
      margin-top: 0.35rem;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 99px;
      width: 0%;
      transition: width 0.3s, background 0.3s;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container nav-container">
    <a href="/index.html" class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px;color:var(--primary)"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M9 13a4.5 4.5 0 0 0 3-4"/><path d="M12 13h4"/><path d="M12 18h6a2 2 0 0 1 2 2v1"/><path d="M12 8h8"/><path d="M16 8V5a2 2 0 0 1 2-2"/><circle cx="16" cy="13" r=".5"/><circle cx="18" cy="3" r=".5"/><circle cx="20" cy="21" r=".5"/><circle cx="20" cy="8" r=".5"/></svg>
      BrainHub<span class="dot">.</span>
    </a>
    <ul class="nav-links">
      <li><a href="/index.html">Home</a></li>
      <li><button id="theme-toggle" class="btn-primary theme-toggle"><i class="fas fa-moon" id="theme-icon"></i></button></li>
    </ul>
  </div>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-logo">
      <a href="/index.html">BrainHub<span>.</span></a>
      <p style="font-size:0.85rem;color:var(--text-500);margin-top:0.3rem" id="authSubtitle">Sign in to sync your progress across all devices</p>
    </div>

    <!-- Tabs (hidden in reset/update mode) -->
    <div class="auth-tabs" id="authTabs">
      <button class="auth-tab active" onclick="switchTab('signin')">Sign In</button>
      <button class="auth-tab" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- Error / Success messages -->
    <div class="auth-error" id="authError"><i class="fas fa-exclamation-circle"></i><span id="authErrorMsg"></span></div>
    <div class="auth-success" id="authSuccess"><i class="fas fa-check-circle"></i><span id="authSuccessMsg"></span></div>

    <!-- ═══════════ SIGN IN ═══════════ -->
    <div class="auth-panel active" id="panel-signin">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" id="siEmail" placeholder="your@email.com" autocomplete="email" />
        </div>
      </div>
      <div class="form-group">
        <label>Password <a href="#" class="forgot-link" onclick="switchTab('reset');return false">Forgot password?</a></label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="siPassword" placeholder="Your password" autocomplete="current-password" />
          <button class="toggle-pw" onclick="togglePw('siPassword',this)" type="button"><i class="fas fa-eye"></i></button>
        </div>
      </div>
      <button class="auth-btn" id="signinBtn" onclick="doSignIn()">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
      <div class="divider">or</div>
      <button class="google-btn" onclick="doGoogle()">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
      <p class="terms-note">By signing in you agree to our <a href="/pages/terms.html">Terms</a> and <a href="/pages/privacy-policy.html">Privacy Policy</a></p>
    </div>

    <!-- ═══════════ SIGN UP ═══════════ -->
    <div class="auth-panel" id="panel-signup">
      <div class="form-group">
        <label>Full Name</label>
        <div class="input-wrap">
          <i class="fas fa-user"></i>
          <input type="text" id="suName" placeholder="e.g. Chanda Mwale" autocomplete="name" />
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" id="suEmail" placeholder="your@email.com" autocomplete="email" />
        </div>
      </div>
      <div class="form-group">
        <label>University</label>
        <div class="input-wrap">
          <i class="fas fa-university"></i>
          <input type="text" id="suUni" placeholder="CBU, UNZA, ZUT…" list="uniList" />
          <datalist id="uniList">
            <option value="CBU"><option value="UNZA"><option value="ZUT">
            <option value="Mulungushi University"><option value="Other">
          </datalist>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="suPassword" placeholder="At least 8 characters" autocomplete="new-password" oninput="checkStrength(this.value)" />
          <button class="toggle-pw" onclick="togglePw('suPassword',this)" type="button"><i class="fas fa-eye"></i></button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      </div>
      <button class="auth-btn" id="signupBtn" onclick="doSignUp()">
        <i class="fas fa-user-plus"></i> Create Account
      </button>
      <div class="divider">or</div>
      <button class="google-btn" onclick="doGoogle()">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
    </div>

    <!-- ═══════════ RESET PASSWORD ═══════════ -->
    <div class="auth-panel" id="panel-reset">
      <p style="font-size:0.88rem;color:var(--text-500);margin-bottom:1.25rem;line-height:1.6">Enter your email and we'll send you a link to reset your password.</p>
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" id="resetEmail" placeholder="your@email.com" />
        </div>
      </div>
      <button class="auth-btn" onclick="doReset()"><i class="fas fa-paper-plane"></i> Send Reset Link</button>
      <div style="text-align:center;margin-top:1rem">
        <a href="#" onclick="switchTab('signin');return false" style="font-size:0.82rem;color:var(--primary);text-decoration:none">← Back to Sign In</a>
      </div>
    </div>

    <!-- ═══════════ UPDATE PASSWORD ═══════════ -->
    <div class="auth-panel" id="panel-update">
      <p style="font-size:0.88rem;color:var(--text-500);margin-bottom:1.25rem">Choose a new password for your account.</p>
      <div class="form-group">
        <label>New Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="newPassword" placeholder="At least 8 characters" oninput="checkStrength(this.value)" />
          <button class="toggle-pw" onclick="togglePw('newPassword',this)" type="button"><i class="fas fa-eye"></i></button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill2"></div></div>
      </div>
      <button class="auth-btn" onclick="doUpdatePassword()"><i class="fas fa-save"></i> Update Password</button>
    </div>

  </div>
</div>

<script src="/src/i18n.js"></script>
<script src="/src/main.js"></script>
<script src="/src/supabase.js"></script>

<script>
(function() {

  // ── Mode from URL ────────────────────────────────────────
  const mode = new URLSearchParams(window.location.search).get('mode') || 'signin';
  if (mode === 'signup') switchTab('signup');
  if (mode === 'reset')  switchTab('reset');
  if (mode === 'update') switchTab('update');

  // Redirect if already logged in
  window.addEventListener('brainhub:signin', () => {
    const next = new URLSearchParams(window.location.search).get('next') || '/pages/profile.html';
    window.location.href = next;
  });

  // ── Tab switcher ─────────────────────────────────────────
  window.switchTab = function(tab) {
    document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('panel-' + tab)?.classList.add('active');

    const tabMap = { signin: 0, signup: 1 };
    const tabs   = document.querySelectorAll('.auth-tab');
    if (tabMap[tab] !== undefined) tabs[tabMap[tab]]?.classList.add('active');

    const subtitles = {
      signin: 'Sign in to sync your progress across all devices',
      signup: 'Create a free account to save your progress',
      reset:  'Reset your password',
      update: 'Set a new password',
    };
    document.getElementById('authSubtitle').textContent = subtitles[tab] || '';
    document.getElementById('authTabs').style.display = (tab === 'reset' || tab === 'update') ? 'none' : '';
    clearMessages();
  };

  // ── Helpers ──────────────────────────────────────────────
  function showError(msg) {
    const el = document.getElementById('authError');
    document.getElementById('authErrorMsg').textContent = msg;
    el.classList.add('show');
    document.getElementById('authSuccess').classList.remove('show');
  }
  function showSuccess(msg) {
    const el = document.getElementById('authSuccess');
    document.getElementById('authSuccessMsg').textContent = msg;
    el.classList.add('show');
    document.getElementById('authError').classList.remove('show');
  }
  function clearMessages() {
    document.getElementById('authError').classList.remove('show');
    document.getElementById('authSuccess').classList.remove('show');
  }
  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    if (!btn) return;
    btn.disabled = loading;
    if (loading) {
      btn._orig = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Please wait…';
    } else {
      btn.innerHTML = btn._orig || btn.innerHTML;
    }
  }

  window.togglePw = function(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon  = btn.querySelector('i');
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'fas fa-eye-slash';
    } else {
      input.type = 'password';
      icon.className = 'fas fa-eye';
    }
  };

  window.checkStrength = function(pw) {
    let score = 0;
    if (pw.length >= 8)  score++;
    if (pw.length >= 12) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    const pct    = (score / 5) * 100;
    const colors = ['#ef4444','#f97316','#eab308','#22c55e','#16a34a'];
    const fills  = ['strengthFill','strengthFill2'];
    fills.forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.style.width = pct + '%'; el.style.background = colors[score-1] || '#ef4444'; }
    });
  };

  // ── Auth actions ─────────────────────────────────────────
  window.doSignIn = async function() {
    const email    = document.getElementById('siEmail').value.trim();
    const password = document.getElementById('siPassword').value;
    if (!email || !password) return showError('Please enter your email and password.');
    setLoading('signinBtn', true);
    clearMessages();

    // Wait for auth to be ready
    await waitForAuth();
    const { error } = await window.BrainHubAuth.signIn(email, password);
    setLoading('signinBtn', false);
    if (error) return showError(friendlyError(error.message));
    // Redirect handled by onAuthStateChange
  };

  window.doSignUp = async function() {
    const name     = document.getElementById('suName').value.trim();
    const email    = document.getElementById('suEmail').value.trim();
    const password = document.getElementById('suPassword').value;
    const uni      = document.getElementById('suUni').value.trim();
    if (!name || !email || !password) return showError('Please fill in all required fields.');
    if (password.length < 8) return showError('Password must be at least 8 characters.');
    setLoading('signupBtn', true);
    clearMessages();

    await waitForAuth();
    const { data, error } = await window.BrainHubAuth.signUp(email, password, name);
    setLoading('signupBtn', false);
    if (error) return showError(friendlyError(error.message));

    // Save university to profile after signup
    if (data?.user && uni) {
      setTimeout(() => {
        window.BrainHubAuth.upsertProfile(data.user.id, { university: uni });
      }, 1000);
    }
    showSuccess('Account created! Check your email to confirm your address, then sign in.');
  };

  window.doGoogle = async function() {
    await waitForAuth();
    const { error } = await window.BrainHubAuth.signInWithGoogle();
    if (error) showError(friendlyError(error.message));
  };

  window.doReset = async function() {
    const email = document.getElementById('resetEmail').value.trim();
    if (!email) return showError('Please enter your email address.');
    await waitForAuth();
    const { error } = await window.BrainHubAuth.resetPassword(email);
    if (error) return showError(friendlyError(error.message));
    showSuccess('Reset link sent! Check your inbox (and spam folder).');
  };

  window.doUpdatePassword = async function() {
    const pw = document.getElementById('newPassword').value;
    if (pw.length < 8) return showError('Password must be at least 8 characters.');
    await waitForAuth();
    const { error } = await window.BrainHubAuth.updatePassword(pw);
    if (error) return showError(friendlyError(error.message));
    showSuccess('Password updated! Redirecting…');
    setTimeout(() => window.location.href = '/pages/profile.html', 1500);
  };

  // ── Enter key support ────────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    const active = document.querySelector('.auth-panel.active');
    if (!active) return;
    const id = active.id;
    if (id === 'panel-signin')  doSignIn();
    if (id === 'panel-signup')  doSignUp();
    if (id === 'panel-reset')   doReset();
    if (id === 'panel-update')  doUpdatePassword();
  });

  // ── Wait for auth SDK to load ────────────────────────────
  function waitForAuth(timeout = 5000) {
    return new Promise((resolve) => {
      if (window.BrainHubAuth) return resolve();
      const start = Date.now();
      const t = setInterval(() => {
        if (window.BrainHubAuth || Date.now() - start > timeout) {
          clearInterval(t); resolve();
        }
      }, 100);
    });
  }

  // ── Friendly error messages ──────────────────────────────
  function friendlyError(msg) {
    if (!msg) return 'Something went wrong. Please try again.';
    if (msg.includes('Invalid login'))      return 'Incorrect email or password.';
    if (msg.includes('Email not confirmed')) return 'Please confirm your email first. Check your inbox.';
    if (msg.includes('User already registered')) return 'An account with this email already exists. Sign in instead.';
    if (msg.includes('Password should be'))  return 'Password must be at least 8 characters.';
    if (msg.includes('Unable to validate')) return 'Invalid email address.';
    if (msg.includes('rate limit'))          return 'Too many attempts. Please wait a minute and try again.';
    return msg;
  }

})();
</script>
</body>
</html>
